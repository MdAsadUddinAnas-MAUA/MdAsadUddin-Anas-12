<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found | Md Asad Uddin Anas</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070915; --text:#eef1fb; --muted:#9aa3c7; --border: rgba(139,123,255,0.20);
    --glass: rgba(255,255,255,0.045); --accent:#22d3ee; --accent-2:#a78bfa;
    --grad: linear-gradient(135deg, var(--accent), var(--accent-2));
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:32px;
  }
  .wrap{ max-width:480px; }
  .code{
    font-family:'Space Grotesk',sans-serif; font-weight:800; font-size:clamp(72px,15vw,120px);
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;
    line-height:1; margin-bottom:16px;
  }
  h1{ font-family:'Space Grotesk',sans-serif; font-size:22px; margin-bottom:14px; }
  p{ color:var(--muted); font-size:15px; margin-bottom:32px; line-height:1.6; }
  a.btn{
    display:inline-flex; align-items:center; gap:9px; padding:14px 28px; border-radius:12px;
    background:var(--grad); color:#04140f; font-weight:600; font-size:14.5px; text-decoration:none;
  }
  .mono{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); margin-top:28px; display:block; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This page took a wrong turn.</h1>
    <p>The page you're looking for doesn't exist or may have moved. Let's get you back to the portfolio.</p>
    <a class="btn" href="/">← Back to Home</a>
    <span class="mono">Md Asad Uddin Anas · Portfolio</span>
  </div>
</body>
</html>
